<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify"><span class="branding">Spotify</span></li>
            <li>Home</li>

    </nav>

    <div class="container">

                    <img src="10.jpg" alt="song-cover-img-1">

                    <span class="songlistplay"><span class="timestamp">05:30 <i id="0" class="fa-solid songItemPlay fa-2x fa-circle-play"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="10.jpg" alt="song-cover-img-1">

                    <span class="songName"></span>
                    <span class="songlistplay"></span><span class="timestamp">05:30 <i id="5" class="fa-solid songItemPlay fa-2x fa-circle-play"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="10.jpg" alt="song-cover-img-1">

                </div>

            </div>
        </div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="progressBar" value="0" min="0" max="100">
        <div class="icons">
            <i class="fa-solid fa-2x fa-backward" id="previous"></i>
            <i class="fa-solid fa-2x fa-circle-play" id="masterPlay"></i>
            <i class="fa-solid fa-2x fa-forward" id="next"></i>
        </div>
        <div class="songInfo">
            <img src="playing.gif" alt="music-gif" id="gif">
            <span id="masterSongName">NCS Song- 1</span>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/419b9a59bd.js" crossorigin="anonymous"></script>
